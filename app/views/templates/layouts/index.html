<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="#">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
  <!-- Support Alpine.js maintain state for HTMX swap content -->
   <!-- Usage: hx-ext="morph" hx-swap="morph"-->
  <script src="https://unpkg.com/htmx-ext-alpine-morph@2.0.0/alpine-morph.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/morph@3.x.x/dist/cdn.min.js"></script>

  <!-- Support persist variables (localStorage) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
  <!-- Support input mask -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/mask@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="{{ static('css/index.css') }}"/>
  <script src="{{ static('js/index.js') }}"></script>
  <title>Sample - {% block title %}{% endblock %}</title>
  {% block styles %}
  {% endblock %}
  {% block pre_scripts %}
  {% endblock %}
</head>

<body class="min-h-screen bg-gray-100 flex">
  {% include 'templates/layouts/sidebar.html' %}
  <main class="grow transition-all ease-in-out overflow-auto h-screen">
    {% include 'templates/layouts/header.html' %}
    <div class="mt-16">
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
{% block post_scripts %}
{% endblock %}
</html>
